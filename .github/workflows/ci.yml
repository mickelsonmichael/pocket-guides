name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Format / Lint / Typecheck / Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to GitHub Pages
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Configure GitHub Pages and obtain the correct base path.
      # enablement: true ensures the Pages source is set to "GitHub Actions"
      # (not "Deploy from branch"), which prevents the raw source index.html
      # from being served. The base_path output is used as the Vite base so
      # asset URLs are correct for both the default github.io URL and any
      # custom domain (which serves from the root, not /pocket-guides/).
      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES_BASE: ${{ steps.pages.outputs.base_path }}

      # Copy index.html to 404.html so GitHub Pages serves the SPA for
      # any route (react-router handles the rest client-side).
      - name: Prepare SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
