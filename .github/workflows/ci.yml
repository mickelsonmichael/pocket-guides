name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  # Needed by actions/upload-pages-artifact on main.
  pages: write
  id-token: write

jobs:
  check:
    name: Format / Lint / Typecheck / Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      # The built output is needed by the deploy workflow on main.
      # Copy index.html to 404.html so GitHub Pages serves the SPA for
      # any route (react-router handles the rest client-side).
      - name: Prepare SPA fallback
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
