name: Deploy to GitHub Pages (Manual)

# Manual re-deploy trigger. Automatic deployments are handled by the
# deploy job in ci.yml after a successful push to main.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Configure GitHub Pages and obtain the correct base path.
      # enablement: true ensures the Pages source is set to "GitHub Actions"
      # (not "Deploy from branch"), which prevents the raw source index.html
      # from being served. The base_path output is used as the Vite base so
      # asset URLs are correct for both the default github.io URL and any
      # custom domain (which serves from the root, not /pocket-guides/).
      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES_BASE: ${{ steps.pages.outputs.base_path }}

      - name: Prepare SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
