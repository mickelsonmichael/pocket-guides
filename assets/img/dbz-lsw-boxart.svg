<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a00"/>
      <stop offset="100%" style="stop-color:#0a0c10"/>
    </linearGradient>
    <linearGradient id="flame" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#cc2200"/>
      <stop offset="50%" style="stop-color:#f4a800"/>
      <stop offset="100%" style="stop-color:#ffe066"/>
    </linearGradient>
  </defs>

  <rect width="200" height="280" fill="url(#bg)"/>

  <!-- Flame background -->
  <path d="M0 210 C25 170 50 195 80 160 C110 125 140 165 170 140 L200 135 L200 280 L0 280 Z" fill="url(#flame)" opacity="0.35"/>
  <path d="M0 230 C35 200 65 220 100 195 C135 170 165 205 200 185 L200 280 L0 280 Z" fill="url(#flame)" opacity="0.55"/>
  <path d="M0 250 C45 230 80 248 120 230 C155 215 175 240 200 225 L200 280 L0 280 Z" fill="url(#flame)" opacity="0.75"/>

  <!-- GBA header bar -->
  <rect width="200" height="38" fill="#f4a800"/>
  <text x="100" y="13" font-family="'Courier New',monospace" font-size="7.5" fill="#1a0800" text-anchor="middle" font-weight="bold" letter-spacing="2">GAME BOY ADVANCE</text>
  <text x="100" y="29" font-family="'Courier New',monospace" font-size="9" fill="#1a0800" text-anchor="middle" font-weight="bold" letter-spacing="1">DRAGON BALL Z</text>

  <!-- Outer border -->
  <rect x="3" y="3" width="194" height="274" fill="none" stroke="#f4a800" stroke-width="1.5" opacity="0.5"/>

  <!-- Giant Z watermark -->
  <text x="102" y="175" font-family="'Courier New',monospace" font-size="140" fill="#f4a800" text-anchor="middle" opacity="0.06" font-weight="bold">Z</text>

  <!-- Aura burst lines -->
  <g stroke="#f4a800" stroke-width="0.8" opacity="0.25">
    <line x1="100" y1="50" x2="60" y2="80"/>
    <line x1="100" y1="50" x2="140" y2="80"/>
    <line x1="100" y1="50" x2="45" y2="100"/>
    <line x1="100" y1="50" x2="155" y2="100"/>
    <line x1="100" y1="50" x2="35" y2="130"/>
    <line x1="100" y1="50" x2="165" y2="130"/>
  </g>

  <!-- Goku silhouette (SSJ) -->
  <g fill="#f4a800" opacity="0.9">
    <!-- SSJ spiky hair -->
    <polygon points="100,48 96,64 99,60"/>
    <polygon points="100,48 104,64 101,60"/>
    <polygon points="93,53 87,67 91,63"/>
    <polygon points="107,53 113,67 109,63"/>
    <polygon points="96,50 90,62 93,58"/>
    <polygon points="104,50 110,62 107,58"/>
    <!-- Head -->
    <ellipse cx="100" cy="78" rx="11" ry="12"/>
    <!-- Neck/collar -->
    <rect x="95" y="89" width="10" height="5" rx="1"/>
    <!-- Torso (gi) -->
    <path d="M88 93 L112 93 L114 128 L86 128 Z"/>
    <!-- Belt -->
    <rect x="86" y="126" width="28" height="5" rx="1"/>
    <!-- Pants -->
    <rect x="88" y="131" width="10" height="32" rx="2"/>
    <rect x="102" y="131" width="10" height="32" rx="2"/>
    <!-- Boots -->
    <path d="M86 160 L98 160 L100 168 L84 168 Z"/>
    <path d="M102 160 L114 160 L116 168 L100 168 Z"/>
    <!-- Left arm (extended outward) -->
    <path d="M88 95 L75 108 L78 114 L90 102 Z"/>
    <!-- Right arm (at side) -->
    <path d="M112 95 L122 105 L120 111 L111 101 Z"/>
    <!-- Gi sash lines -->
    <rect x="96" y="93" width="2" height="35" opacity="0.4"/>
    <rect x="102" y="93" width="2" height="35" opacity="0.4"/>
  </g>

  <!-- Aura glow ring around figure -->
  <ellipse cx="100" cy="130" rx="38" ry="52" fill="none" stroke="#f4a800" stroke-width="1" opacity="0.15"/>

  <!-- Title box -->
  <rect x="8" y="186" width="184" height="52" fill="#0a0c10" opacity="0.9" rx="1"/>
  <rect x="8" y="186" width="184" height="52" fill="none" stroke="#f4a800" stroke-width="1" rx="1"/>
  <text x="100" y="203" font-family="'Courier New',monospace" font-size="8" fill="#f4a800" text-anchor="middle" font-weight="bold" letter-spacing="1">LEGENDARY</text>
  <text x="100" y="217" font-family="'Courier New',monospace" font-size="8" fill="#f4a800" text-anchor="middle" font-weight="bold" letter-spacing="1">SUPER WARRIORS</text>
  <text x="100" y="230" font-family="'Courier New',monospace" font-size="6.5" fill="#4fc3f7" text-anchor="middle" letter-spacing="0.5">RPG  ·  GAME BOY ADVANCE</text>

  <!-- Bottom bar -->
  <rect x="8" y="246" width="184" height="22" fill="none" stroke="#2a3040" stroke-width="0.5"/>
  <text x="100" y="261" font-family="'Courier New',monospace" font-size="6" fill="#7a8599" text-anchor="middle">© 2002 INFOGRAMES</text>
</svg>
