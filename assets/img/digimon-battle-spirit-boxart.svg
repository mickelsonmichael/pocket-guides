<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2a6c"/>
      <stop offset="50%" stop-color="#b21f1f"/>
      <stop offset="100%" stop-color="#1a2a6c"/>
    </linearGradient>
  </defs>
  <rect width="200" height="280" fill="url(#bg)"/>
  <rect x="4" y="4" width="192" height="272" fill="none" stroke="#fddb92" stroke-width="2" opacity="0.6"/>

  <!-- Agumon silhouette -->
  <!-- Body -->
  <ellipse cx="100" cy="178" rx="34" ry="36" fill="#c8711a" opacity="0.85"/>
  <!-- Head -->
  <ellipse cx="100" cy="122" rx="32" ry="28" fill="#c8711a" opacity="0.85"/>
  <!-- Left ear nub -->
  <polygon points="80,100 70,82 90,96" fill="#c8711a" opacity="0.85"/>
  <!-- Right ear nub -->
  <polygon points="120,100 130,82 110,96" fill="#c8711a" opacity="0.85"/>
  <!-- Eyes -->
  <circle cx="90" cy="118" r="5" fill="#1a1a1a"/>
  <circle cx="110" cy="118" r="5" fill="#1a1a1a"/>
  <circle cx="91" cy="116" r="2" fill="#fff"/>
  <circle cx="111" cy="116" r="2" fill="#fff"/>
  <!-- Mouth / snout -->
  <ellipse cx="100" cy="132" rx="14" ry="8" fill="#d4884a" opacity="0.7"/>
  <!-- Tail -->
  <path d="M134,195 Q158,205 162,185 Q168,165 148,158" stroke="#c8711a" stroke-width="9" fill="none" stroke-linecap="round" opacity="0.85"/>
  <!-- Claws -->
  <line x1="72" y1="210" x2="65" y2="225" stroke="#e0e0e0" stroke-width="3" stroke-linecap="round"/>
  <line x1="80" y1="213" x2="76" y2="228" stroke="#e0e0e0" stroke-width="3" stroke-linecap="round"/>
  <line x1="88" y1="214" x2="87" y2="229" stroke="#e0e0e0" stroke-width="3" stroke-linecap="round"/>

  <!-- D-spirit orb accent -->
  <circle cx="152" cy="72" r="14" fill="#4fc3f7" opacity="0.5"/>
  <circle cx="152" cy="72" r="9" fill="#4fc3f7" opacity="0.7"/>
  <circle cx="148" cy="68" r="3" fill="#ffffff" opacity="0.7"/>

  <!-- GBA badge -->
  <rect x="12" y="243" width="176" height="26" rx="3" fill="#1a1a1a" opacity="0.7"/>
  <text x="100" y="256" font-family="monospace" font-size="7" fill="#fddb92" text-anchor="middle" font-weight="bold">GAME BOY ADVANCE</text>
  <text x="100" y="265" font-family="monospace" font-size="6" fill="#ffffff" text-anchor="middle">2002</text>

  <!-- Title -->
  <rect x="0" y="10" width="200" height="46" fill="#1a1a1a" opacity="0.6"/>
  <text x="100" y="26" font-family="monospace" font-size="7" fill="#fddb92" text-anchor="middle" font-weight="bold">DIGIMON</text>
  <text x="100" y="38" font-family="monospace" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold">BATTLE SPIRIT</text>
  <text x="100" y="50" font-family="monospace" font-size="5" fill="#4fc3f7" text-anchor="middle">DIMPS · BANDAI</text>
</svg>
